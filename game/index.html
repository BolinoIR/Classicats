<!doctype html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Project Classicats">
  <meta name="description" content="Project Classicats local rebuild of the recovered C.A.T.S. web client.">
  <meta name="theme-color" content="#000000">
  <link rel="canonical" href="https://catsthegame.bolino.ir/game/">
  <link rel="manifest" href="manifest-game.json">
  <link href="favicon.ico" rel="shortcut icon">
  <title>Project Classicats</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
    }

    #canvas {
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      position: relative;
    }

    .game-container,
    .loading-page {
      position: fixed;
      inset: 0;
    }

    .game-container {
      background: #000;
    }

    .loading-page {
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      background: #090909;
    }

    .cats-logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .subline {
      font-size: 14px;
      font-weight: 400;
      opacity: .7;
      text-align: center;
      margin-top: 6px;
    }

    .container-logos-landscape {
      display: none;
    }

    .fb-loader-cube {
      width: 42px;
      height: 42px;
      position: relative;
      transform: rotate(45deg);
    }

    .sk-cube {
      width: 18px;
      height: 18px;
      position: absolute;
      background: #f5c84b;
      animation: classicats-loader 1.2s infinite ease-in-out;
    }

    .sk-cube1 { top: 0; left: 0; }
    .sk-cube2 { top: 0; right: 0; animation-delay: .15s; }
    .sk-cube3 { right: 0; bottom: 0; animation-delay: .3s; }
    .sk-cube4 { left: 0; bottom: 0; animation-delay: .45s; }

    .loading-bar {
      width: min(320px, 70vw);
      height: 4px;
      background: rgba(255, 255, 255, .18);
      overflow: hidden;
    }

    .loading-bar::after {
      content: "";
      display: block;
      width: 35%;
      height: 100%;
      background: #f5c84b;
      animation: classicats-bar 1.4s infinite ease-in-out;
    }

    @keyframes classicats-loader {
      0%, 70%, 100% { transform: scale(1); }
      35% { transform: scale(.35); }
    }

    @keyframes classicats-bar {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(320%); }
    }
  </style>
  <script>
    (function() {
      var hosted = window.location.hostname === 'catsthegame.bolino.ir';
      var wsScheme = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
      window.CLASSICATS_CONFIG = {
        gameBase: hosted ? 'https://catsthegame.bolino.ir/game' : window.location.origin + '/game',
        apiBase: hosted ? 'https://catsthegame.bolino.ir/api' : window.location.origin + '/api',
        websocketUrl: hosted ? 'wss://catsthegame.bolino.ir:8080' : wsScheme + window.location.hostname + ':8080',
        socketServer: hosted ? 'catsthegame.bolino.ir~8080' : window.location.hostname + '~8080',
        localApiBase: hosted ? 'https://catsthegame.bolino.ir/api' : '/api'
      };
    })();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw-game.js').then(function(registration) {
          console.log('[Classicats] Service worker registered:', registration.scope);
        }).catch(function(error) {
          console.warn('[Classicats] Service worker registration failed:', error);
        });
      });
    }
  </script>
  <script src="gamepix-loader.js"></script>
</head>
<body class="game-page">
  <div class="gpxCatsWebUi-main-container loading-page" id="fb-loading">
    <div class="cats-logo logos">
      <div class="subline">Project Classicats</div>
    </div>
    <div class="container-logos-landscape">
      <div class="zeptolab-logo logos"></div>
      <div class="gamepix-logo logos"></div>
    </div>
    <div class="fb-loader-cube">
      <div class="sk-cube1 sk-cube"></div>
      <div class="sk-cube2 sk-cube"></div>
      <div class="sk-cube4 sk-cube"></div>
      <div class="sk-cube3 sk-cube"></div>
    </div>
    <div id="loading-bar" class="loading-bar"></div>
  </div>

  <div id="game-container" class="game-container">
    <canvas id="canvas"></canvas>
  </div>

  <div id="xl_auth" class="loader"></div>
  <div class="page-content" id="root"></div>
  <div id="error-root"></div>
  <div id="modal-root"></div>
  <div id="badge-root"></div>
  <div id="fullscreen-root"></div>
  <div id="rotate-root"></div>
  <div id="apple-pay-waiting-root"></div>
  <div id="device-not-supported-root"></div>
  <div id="debug-root"></div>

  <script src="/gamepix.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
